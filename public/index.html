<body>
    <h1>Silverpine Research Labs User Checker</h1>
    <div class="card">
        <input type="text" id="userIdInput" placeholder="Enter Roblox Username or User ID">
        <button onclick="fetchUserData()">Check</button>
        <div id="result" class="profile"></div>
    </div>

    <script>
        const API_BASE = "/proxy";

        function proxyUrl(service, path, queryString = "") {
            const query = queryString ? `?${queryString}` : "";
            return `${API_BASE}/${service}${path}${query}`;
        }

        // ─── 3D Avatar viewer ─────────────────────────────────────────────────────
        //
        // Roblox's /v1/users/avatar-3d endpoint returns a URL pointing to a JSON
        // blob on a numbered CDN (t0-t7.rbxcdn.com). That blob contains camera
        // data, an AABB for the avatar, and MD5 hashes for the OBJ mesh, MTL
        // material, and texture files. Each hash maps to a specific CDN subdomain
        // via a XOR formula. The existing /proxy/cdn route only covers tr.rbxcdn.com,
        // so a separate /proxy/rbxcdn/{n}/{hash} route in worker.js handles these.

        const AVATAR_W = 120;
        const AVATAR_H = 180;

        // Compute t0-t7 CDN server for a hash and return a proxied URL.
        // Formula: https://devforum.roblox.com/t/roblox-cdn-how-do-i-know-which-one-to-use/1274498
        function hashToCdnUrl(hash) {
            let i = 31;
            const len = Math.min(38, hash.length);
            for (let t = 0; t < len; t++) i ^= hash.charCodeAt(t);
            return `/proxy/rbxcdn/${i % 8}/${hash}`;
        }

        // Passed to Three.js loaders so that texture hashes referenced inside the
        // MTL file are routed to the correct CDN server.
        // Roblox MTL files reference textures with names like "30DAY-<hash>" where
        // the prefix is a cache-busting tag and the trailing 32-char hex string is
        // the actual CDN hash. We extract that hash and proxy accordingly.
        function urlModifier(url) {
            // Helper: extract the trailing 32-char hex hash from any string that
            // may have a prefix (e.g. "30DAY-93ee96..."). The CDN only knows the
            // hash itself, not the prefixed filename the MTL references.
            function extractHash(str) {
                const m = str.match(/([a-f0-9]{32})$/i);
                return m ? m[1] : null;
            }

            try {
                const parsed = new URL(url, window.location.href);
                const hostMatch = parsed.hostname.match(/^t(\d+)\.rbxcdn\.com$/);
                if (hostMatch) {
                    // Full tN.rbxcdn.com URL. Strip any prefix from the path and
                    // recompute the correct CDN server for this specific hash,
                    // since different assets may live on different servers.
                    const filename = parsed.pathname.split("/").pop();
                    const hash = extractHash(filename);
                    if (hash) return hashToCdnUrl(hash);
                    // No hash found — pass the full path through as a last resort.
                    return `/proxy/rbxcdn/${hostMatch[1]}${parsed.pathname}`;
                }
            } catch { /* not a valid absolute URL, fall through */ }

            // Relative URL or bare filename — extract trailing hash.
            const filename = url.split("?")[0].split("/").pop();
            const hash = extractHash(filename);
            if (hash) return hashToCdnUrl(hash);
            return url;
        }

        // Swap the canvas container for a plain 2D full-body PNG when the 3D
        // thumbnail state is "Pending" or Three.js loaders are unavailable.
        async function showFallbackAvatar(userId) {
            const container = document.getElementById("avatar-3d-container");
            if (!container) return;
            const img = document.createElement("img");
            img.className = "avatar-fallback";
            img.alt = "Avatar";
            try {
                const res = await fetch(
                    proxyUrl("thumbnails", "/v1/users/avatar",
                        `userIds=${userId}&size=150x200&format=Png&isCircular=false`)
                );
                const data = await res.json();
                img.src = data.data?.[0]?.imageUrl || "";
            } catch { img.src = ""; }
            container.replaceWith(img);
        }

        async function initAvatarViewer(userId) {
            // Bail gracefully if any Three.js dependency failed to load.
            if (typeof THREE === "undefined" ||
                typeof THREE.OBJLoader === "undefined" ||
                typeof THREE.MTLLoader === "undefined") {
                await showFallbackAvatar(userId);
                return;
            }

            const canvas = document.getElementById("avatar-canvas");
            const loadingEl = document.getElementById("avatar-loading");
            if (!canvas) return;

            try {
                // 1. Fetch 3D thumbnail metadata.
                const thumbData = await fetch(
                    proxyUrl("thumbnails", "/v1/users/avatar-3d", `userId=${userId}`)
                ).then(r => r.json());

                if (thumbData.state !== "Completed" || !thumbData.imageUrl) {
                    await showFallbackAvatar(userId);
                    return;
                }

                // 2. The imageUrl is on a numbered CDN (e.g. https://t4.rbxcdn.com/HASH).
                //    Use URL parsing instead of regex so hyphens and other chars
                //    in the path don't truncate the hash.
                let cdnServer, cdnPath;
                try {
                    const cdnParsed = new URL(thumbData.imageUrl);
                    const serverMatch = cdnParsed.hostname.match(/^t(\d+)\.rbxcdn\.com$/);
                    if (!serverMatch) { await showFallbackAvatar(userId); return; }
                    cdnServer = serverMatch[1];
                    cdnPath = cdnParsed.pathname.slice(1); // strip leading /
                } catch { await showFallbackAvatar(userId); return; }

                const modelJsonRes = await fetch(`/proxy/rbxcdn/${cdnServer}/${cdnPath}`);
                if (!modelJsonRes.ok) {
                    console.error("CDN model JSON fetch failed:", modelJsonRes.status);
                    await showFallbackAvatar(userId);
                    return;
                }
                const modelData = await modelJsonRes.json();

                // 3. Three.js scene setup.
                const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
                renderer.setSize(AVATAR_W, AVATAR_H);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

                const scene = new THREE.Scene();
                scene.background = new THREE.Color(0x2a2a2a);

                const { camera: cam, aabb } = modelData;
                const cx = (aabb.min.x + aabb.max.x) / 2;
                const cy = (aabb.min.y + aabb.max.y) / 2;
                const cz = (aabb.min.z + aabb.max.z) / 2;

                const camera = new THREE.PerspectiveCamera(cam.fov, AVATAR_W / AVATAR_H, 0.1, 500);
                camera.position.set(cam.position.x, cam.position.y, cam.position.z);
                camera.lookAt(cx, cy, cz);

                scene.add(new THREE.AmbientLight(0xffffff, 0.7));
                const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
                dirLight.position.set(5, 10, 7);
                scene.add(dirLight);

                // 4. OrbitControls: auto-rotates by default, user can drag to inspect.
                let controls = null;
                if (typeof THREE.OrbitControls !== "undefined") {
                    controls = new THREE.OrbitControls(camera, canvas);
                    controls.target.set(cx, cy, cz);
                    controls.enablePan = false;
                    controls.enableZoom = false;
                    controls.autoRotate = true;
                    controls.autoRotateSpeed = 2.5;
                    controls.update();
                }

                // 5. Fetch MTL as raw text, rewrite all texture references to
                //    proxy URLs before Three.js ever sees them, then use parse()
                //    instead of load(). This is more reliable than urlModifier
                //    because Three.js resolves relative paths internally before
                //    the modifier can intercept them, causing the full prefixed
                //    filename (e.g. "30DAY-hash") to reach the CDN unchanged.
                const mtlUrl = hashToCdnUrl(modelData.mtl);
                const objUrl = hashToCdnUrl(modelData.obj);

                const mtlText = await fetch(mtlUrl).then(r => r.text());

                // Replace every map_ texture reference: both bare hashes and
                // prefixed names like "30DAY-<hash>". We extract the trailing
                // 32-char hex hash and rewrite it to the correct proxy URL.
                const processedMtl = mtlText.replace(
                    /^(\s*map_\w+(?:\s+-\w+\s+\S+)*\s+)(\S+)/gim,
                    (match, directive, texRef) => {
                        const hashMatch = texRef.match(/([a-f0-9]{32})$/i);
                        if (hashMatch) return directive + hashToCdnUrl(hashMatch[1]);
                        return match;
                    }
                );

                const mtlLoader = new THREE.MTLLoader();
                // parse() takes text + base path; empty base path means texture
                // paths we wrote above are used as-is (they're already absolute).
                const materials = mtlLoader.parse(processedMtl, '/');
                materials.preload();

                // Roblox exports include an alpha map that makes the mesh
                // transparent. Disable it so the avatar renders solid.
                for (const key in materials.materials) {
                    materials.materials[key].transparent = false;
                    materials.materials[key].side = THREE.FrontSide;
                }

                const objLoader = new THREE.OBJLoader();
                objLoader.setMaterials(materials);

                objLoader.load(objUrl, (object) => {
                    scene.add(object);
                    if (loadingEl) loadingEl.style.display = "none";

                    (function animate() {
                        requestAnimationFrame(animate);
                        if (controls) controls.update();
                        else object.rotation.y += 0.01;
                        renderer.render(scene, camera);
                    })();
                });

            } catch (err) {
                console.error("3D avatar failed:", err);
                await showFallbackAvatar(userId);
            }
        }

        // ─── Roblox helpers ───────────────────────────────────────────────────────

        async function getUserIDFromUsername(name) {
            try {
                const cleanedName = name.replace(/^@/, "").replace(/[()]/g, "").trim();
                const res = await fetch(proxyUrl("users", "/v1/usernames/users"), {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ usernames: [cleanedName], excludeBannedUsers: false })
                });
                if (!res.ok) throw new Error("Invalid response");
                const data = await res.json();
                const user = data.data?.[0];
                if (!user?.id) throw new Error("User ID not found");
                return user.id;
            } catch (err) {
                console.error("Failed to get user ID:", err);
                return null;
            }
        }

        function clearUsernamePath() {
            if (window.location.pathname.startsWith("/username/"))
                window.history.replaceState({}, "", "/");
        }

        // ─── Blacklist fetchers ───────────────────────────────────────────────────

        async function fetchBlacklist(sheetId, sheet, columns, userId) {
            const base = `https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values`;
            const key = "AIzaSyCAikFNJygYWQTLyrskY4-KKcbuQJ_o_Hk";
            const enc = encodeURIComponent;

            const idCol = columns.id;
            const idRes = await fetch(`${base}/'${enc(sheet)}'!${idCol}:${idCol}?key=${key}`);
            if (!idRes.ok) return null;
            const idRows = (await idRes.json()).values || [];
            const rowIndex = idRows.findIndex(r => r[0]?.toString() === userId.toString());
            if (rowIndex === -1) return null;

            const detailRes = await fetch(`${base}/'${enc(sheet)}'!${columns.range}?key=${key}`);
            if (!detailRes.ok) return null;
            const row = (await detailRes.json()).values?.[rowIndex] || [];
            return columns.map(row);
        }

        async function fetchTemporaryBlacklistEntry(userId) {
            const sid = "1nqYVijw4shUKdLS_xntMbELH4IJ_p_M61MFqE503GSA";
            const key = "AIzaSyCAikFNJygYWQTLyrskY4-KKcbuQJ_o_Hk";
            const base = `https://sheets.googleapis.com/v4/spreadsheets/${sid}/values`;
            try {
                const colRes = await fetch(`${base}/'Temporary%20Blacklists'!B:B?key=${key}`);
                if (!colRes.ok) return null;
                const rows = (await colRes.json()).values || [];
                const idx = rows.findIndex(r => r[0]?.toString() === userId.toString());
                if (idx === -1) return null;
                const detRes = await fetch(`${base}/'Temporary%20Blacklists'!A:F?key=${key}`);
                if (!detRes.ok) return null;
                const row = (await detRes.json()).values?.[idx] || [];
                return { username: row[0]||"", robloxId: row[1]||"", discordId: row[2]||"", duration: row[3]||"", appealable: row[4]||"", notes: row[5]||"" };
            } catch (err) { console.error(err); return null; }
        }

        async function fetchPermanentBlacklistEntry(userId) {
            const sid = "1nqYVijw4shUKdLS_xntMbELH4IJ_p_M61MFqE503GSA";
            const key = "AIzaSyCAikFNJygYWQTLyrskY4-KKcbuQJ_o_Hk";
            const base = `https://sheets.googleapis.com/v4/spreadsheets/${sid}/values`;
            try {
                const colRes = await fetch(`${base}/'Permanent%20Blacklists'!B:B?key=${key}`);
                if (!colRes.ok) return null;
                const rows = (await colRes.json()).values || [];
                const idx = rows.findIndex(r => r[0]?.toString() === userId.toString());
                if (idx === -1) return null;
                const detRes = await fetch(`${base}/'Permanent%20Blacklists'!A:E?key=${key}`);
                if (!detRes.ok) return null;
                const row = (await detRes.json()).values?.[idx] || [];
                return { username: row[0]||"", robloxId: row[1]||"", discordId: row[2]||"", appealable: row[3]||"", notes: row[4]||"" };
            } catch (err) { console.error(err); return null; }
        }

        async function fetchPsychiatryTemporaryBlacklistEntry(userId) {
            const sid = "1qzrNIy22MUTvHt34Q4o6PvHmR9dR3TYOdWzmR-Q5baM";
            const key = "AIzaSyCAikFNJygYWQTLyrskY4-KKcbuQJ_o_Hk";
            const base = `https://sheets.googleapis.com/v4/spreadsheets/${sid}/values`;
            try {
                const colRes = await fetch(`${base}/'Temporary%20Blacklists'!C:C?key=${key}`);
                if (!colRes.ok) return null;
                const rows = (await colRes.json()).values || [];
                const idx = rows.findIndex(r => r[0]?.toString() === userId.toString());
                if (idx === -1) return null;
                const detRes = await fetch(`${base}/'Temporary%20Blacklists'!B:K?key=${key}`);
                if (!detRes.ok) return null;
                const row = (await detRes.json()).values?.[idx] || [];
                return { username: row[0]||"", robloxId: row[1]||"", discordId: row[2]||"", dateLogged: row[4]||"", blacklistLength: row[6]||"", expiresOn: row[7]||"", notes: row[9]||"" };
            } catch (err) { console.error(err); return null; }
        }

        async function fetchPsychiatryPermanentBlacklistEntry(userId) {
            const sid = "1qzrNIy22MUTvHt34Q4o6PvHmR9dR3TYOdWzmR-Q5baM";
            const key = "AIzaSyCAikFNJygYWQTLyrskY4-KKcbuQJ_o_Hk";
            const base = `https://sheets.googleapis.com/v4/spreadsheets/${sid}/values`;
            try {
                const colRes = await fetch(`${base}/'Permanent%20Blacklists'!C:C?key=${key}`);
                if (!colRes.ok) return null;
                const rows = (await colRes.json()).values || [];
                const idx = rows.findIndex(r => r[0]?.toString() === userId.toString());
                if (idx === -1) return null;
                const detRes = await fetch(`${base}/'Permanent%20Blacklists'!B:K?key=${key}`);
                if (!detRes.ok) return null;
                const row = (await detRes.json()).values?.[idx] || [];
                return { username: row[0]||"", robloxId: row[1]||"", discordId: row[2]||"", dateLogged: row[4]||"", appealable: row[6]||"", whenToAppeal: row[7]||"", notes: row[9]||"" };
            } catch (err) { console.error(err); return null; }
        }

        // ─── Main lookup ──────────────────────────────────────────────────────────

        async function fetchUserData(initialInput = null) {
            const inputElement = document.getElementById("userIdInput");
            if (!initialInput) clearUsernamePath();

            let input = (initialInput ?? inputElement.value).trim().replace(/^@/, "").replace(/[()]/g, "").trim();
            const result = document.getElementById("result");
            result.innerHTML = "Loading...";

            const userId = /^\d+$/.test(input) ? input : await getUserIDFromUsername(input);
            if (!userId) { result.innerHTML = "❌ Failed to find user by username."; return; }
            if (!initialInput) inputElement.value = input;

            let isBanned = typeof window.isbanned !== "undefined" ? window.isbanned : false;

            try {
                const [userRes, groupsRes, friendsRes] = await Promise.all([
                    fetch(proxyUrl("users", `/v1/users/${userId}`)),
                    fetch(proxyUrl("groups", `/v1/users/${userId}/groups/roles`)),
                    fetch(proxyUrl("friends", `/v1/users/${userId}/friends/count`))
                ]);

                const user = await userRes.json();
                const groupData = (await groupsRes.json()).data;
                const friendCount = (await friendsRes.json()).count;

                let usernameHistory = null;
                try {
                    const r = await fetch(proxyUrl("users", `/v1/users/${userId}/username-history`));
                    if (r.ok) usernameHistory = await r.json();
                } catch { /* optional */ }

                let usernamesHtml = "";
                if (usernameHistory?.data?.length > 0) {
                    usernamesHtml = `<div class="small"><strong>Previous Usernames:</strong></div>`;
                    usernamesHtml += usernameHistory.data.map(u => `<div class="small"><strong>${u.name}</strong></div>`).join("");
                } else if (usernameHistory === null) {
                    usernamesHtml = `<div class="small">Previous usernames are temporarily unavailable.</div>`;
                }

                const targetGroups = [
                    { id: 621506828, name: "Silverpine Research Labs" },
                    { id: 564810012, name: "in the <strong>Silverpine Ethics Department</strong>" },
                    { id: 815357818, name: "part of <strong>Silverpine Quality Assurance & Development</strong>" },
                    { id: 433164202, name: "in the <strong>Silverpine DPD Department</strong>" },
                    { id: 294546230, name: "in the <strong>Silverpine Security Department</strong>" },
                    { id: 403269953, name: "in the <strong>Silverpine Community Outreach Department</strong>" },
                    { id: 99598765, name: "in the <strong>Silverpine Medical Department</strong>" },
                ];

                const logosRes = await fetch(
                    proxyUrl("thumbnails", "/v1/groups/icons",
                        `groupIds=${targetGroups.map(g => g.id).join(",")}&size=150x150&format=Png&isCircular=false`)
                );
                const logos = (await logosRes.json()).data.reduce((acc, cur) => (acc[cur.targetId] = cur.imageUrl, acc), {});

                const [tempBL, permBL, psyTempBL, psyPermBL] = await Promise.all([
                    fetchTemporaryBlacklistEntry(userId),
                    fetchPermanentBlacklistEntry(userId),
                    fetchPsychiatryTemporaryBlacklistEntry(userId),
                    fetchPsychiatryPermanentBlacklistEntry(userId)
                ]);

                function timeAgo(date) {
                    const seconds = Math.floor((new Date() - new Date(date)) / 1000);
                    for (const [name, s] of [["year",31536000],["month",2592000],["day",86400],["hour",3600],["minute",60],["second",1]]) {
                        const c = Math.floor(seconds / s);
                        if (c > 0) return `${c} ${name}${c > 1 ? "s" : ""} ago`;
                    }
                    return "Just now";
                }

                let html = `
                    <div class="profile-header">
                        <div class="avatar-container" id="avatar-3d-container">
                            <canvas id="avatar-canvas"></canvas>
                            <div class="avatar-loading" id="avatar-loading">Loading 3D…</div>
                        </div>
                        <div>
                            <strong>${user.displayName}</strong><br>
                            <div>@${user.name}</div>
                            <div class="small">User ID: ${user.id}</div>
                            <div class="small">Connections: ${friendCount}</div>
                            <div class="small">Communities: ${groupData.length}</div>
                            <div class="small">Account Created: ${new Date(user.created).toLocaleDateString("en-US", { month: "2-digit", day: "2-digit", year: "numeric" })} (${timeAgo(user.created)})</div>
                            ${usernamesHtml}
                            <a href="https://www.roblox.com/users/${user.id}/profile" target="_blank" class="small-button">🔗 View Profile</a>
                        </div>
                    </div>
                    <div class="divider"></div>
                `;

                if (isBanned) html += `<div class="group-entry"><div style="color:red;">❌ This user is currently banned from Roblox.</div></div>`;

                const staffId = targetGroups[0].id;
                const inSRL = groupData.find(g => g.group.id === staffId);
                html += inSRL
                    ? `<div class="group-entry"><img src="${logos[staffId]}"><div>✅ User <strong>is</strong> part of the Silverpine Research Labs community.<br><strong>Rank:</strong> ${inSRL.role.name}</div></div>`
                    : `<div class="group-entry"><img src="${logos[staffId]}"><div>❌ User <strong>isn't</strong> part of the Silverpine Research Labs community.</div></div>`;

                html += `<div class="divider"></div>`;
                for (const group of targetGroups.slice(1)) {
                    const member = groupData.find(g => g.group.id === group.id);
                    if (member) html += `<div class="group-entry"><img src="${logos[group.id]}"><div>User is ${group.name} | <strong>${member.role.name}</strong></div></div>`;
                }

                function blSection(title, fields) {
                    return `<div class="divider"></div>
                        <div class="group-entry"><div><strong>${title}</strong></div></div>
                        <div style="margin-left:50px;">${fields}</div>`;
                }
                function row2(a, b) { return `<div class="blacklist-row"><div class="blacklist-field">${a}</div><div class="blacklist-field">${b}</div></div>`; }
                function field(label, val) { return `<div class="blacklist-section"><div><strong>${label}</strong></div><div>${val||"N/A"}</div></div>`; }

                if (tempBL) html += blSection("Orderly Temporary Blacklist",
                    field("Username:", tempBL.username) +
                    row2(field("Roblox ID:", tempBL.robloxId), field("Discord ID:", tempBL.discordId)) +
                    row2(field("Duration:", tempBL.duration), field("Appealable:", tempBL.appealable)) +
                    field("Notes:", tempBL.notes));

                if (permBL) html += blSection("Orderly Permanent Blacklist",
                    field("Username:", permBL.username) +
                    row2(field("Roblox ID:", permBL.robloxId), field("Discord ID:", permBL.discordId)) +
                    field("Appealable:", permBL.appealable) +
                    field("Notes:", permBL.notes));

                if (psyTempBL) html += blSection("Psychiatry Temporary Blacklist",
                    field("Username:", psyTempBL.username) +
                    row2(field("Roblox ID:", psyTempBL.robloxId), field("Discord ID:", psyTempBL.discordId)) +
                    field("Date logged:", psyTempBL.dateLogged) +
                    row2(field("BL length:", psyTempBL.blacklistLength), field("Expires on:", psyTempBL.expiresOn)) +
                    field("Additional notes:", psyTempBL.notes));

                if (psyPermBL) html += blSection("Psychiatry Permanent Blacklist",
                    field("Username:", psyPermBL.username) +
                    row2(field("Roblox ID:", psyPermBL.robloxId), field("Discord ID:", psyPermBL.discordId)) +
                    field("Date logged:", psyPermBL.dateLogged) +
                    row2(field("Appealable:", psyPermBL.appealable), field("When to appeal:", psyPermBL.whenToAppeal)) +
                    field("Additional notes:", psyPermBL.notes));

                result.innerHTML = html;

                // Init 3D viewer after DOM update (fire-and-forget)
                initAvatarViewer(userId);

                const targetPath = `/userid/${userId}`;
                if (window.location.pathname !== targetPath)
                    window.history.replaceState({}, "", targetPath);

            } catch (err) {
                console.error(err);
                result.innerHTML = "❌ Failed to load data.";
            }
        }

        // ─── Keyboard + initial path ──────────────────────────────────────────────

        document.getElementById("userIdInput").addEventListener("keydown", e => {
            if (e.key === "Enter") fetchUserData();
        });

        async function setShareMetadataForUserPath() {
            const path = window.location.pathname;
            const userIdMatch = path.match(/^\/userid\/(\d+)(?:\/)?$/);
            const usernameMatch = path.match(/^\/username\/(.+)\/?$/);
            let userId = userIdMatch?.[1];
            if (!userId && usernameMatch) userId = await getUserIDFromUsername(decodeURIComponent(usernameMatch[1]));
            if (!userId) return;

            let description = `SRL User Checker - User | ${userId}`;
            try {
                const r = await fetch(proxyUrl("users", `/v1/users/${userId}`));
                if (r.ok) {
                    const u = await r.json();
                    const name = u.name || u.displayName;
                    if (name) description = `SRL User Checker - ${name} | ${userId}`;
                }
            } catch { /* optional */ }

            for (const sel of ['meta[name="description"]', 'meta[property="og:description"]', 'meta[name="twitter:description"]'])
                document.querySelector(sel)?.setAttribute("content", description);

            try {
                const r = await fetch(proxyUrl("thumbnails", "/v1/users/avatar-headshot", `userIds=${userId}&size=420x420&format=Png&isCircular=true`));
                if (r.ok) {
                    const url = (await r.json()).data?.[0]?.imageUrl;
                    if (url) {
                        document.querySelector('meta[property="og:image"]')?.setAttribute("content", url);
                        document.querySelector('meta[name="twitter:image"]')?.setAttribute("content", url);
                    }
                }
            } catch { /* optional */ }
        }

        function handleInitialPath() {
            const path = window.location.pathname;
            const userIdMatch = path.match(/^\/userid\/(\d+)\/?$/);
            if (userIdMatch) {
                document.getElementById("userIdInput").value = userIdMatch[1];
                fetchUserData(userIdMatch[1]);
                return;
            }
            const usernameMatch = path.match(/^\/username\/(.+)\/?$/);
            if (usernameMatch) {
                const username = decodeURIComponent(usernameMatch[1]);
                document.getElementById("userIdInput").value = username;
                fetchUserData(username);
            }
        }

        window.addEventListener("load", () => {
            setShareMetadataForUserPath();
            handleInitialPath();
        });
    </script>
</body>
</html>
